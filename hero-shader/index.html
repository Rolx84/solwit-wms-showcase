<!doctype html>
<html lang="lv">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
  <meta name="description" content="Solwit WMS — shader hero variant (option 2/3)"/>
  <meta name="theme-color" content="#62358F"/>
  <title>Solwit WMS — shader hero</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link rel="icon" href="../assets/logo-purple.svg" type="image/svg+xml"/>
  <link rel="stylesheet" href="../colors_and_type.css"/>
  <link rel="stylesheet" href="styles.css"/>
  <script defer src="app.js"></script>
</head>
<body>
  <nav class="variant-pill" aria-label="Hero variants">
    <a href="/showcase/" class="variant-pill__item">&#9312; three.js</a>
    <a href="/hero-shader/" class="variant-pill__item is-active">&#9313; shader</a>
    <a href="/hero-scroll/" class="variant-pill__item">&#9314; gsap</a>
  </nav>

  <main class="hero">
    <canvas id="shader-canvas" aria-hidden="true"></canvas>

    <div class="hero__overlay">
      <p class="section-label">reāllaika noliktavas vadība</p>

      <h1 class="hero__headline">
        Redziet savu noliktavu<br/>
        <span class="h1-mono">tā, kā tā ir tagad</span>
      </h1>

      <p class="hero__lead">
        Katra skenēšana parādās 50 milisekundēs. Katrs lēmums — uz reāliem skaitļiem.
        Noliktavas pārvaldība, kas seko līdzi jūsu biznesa ātrumam.
      </p>

      <div class="hero__ctas">
        <a href="#demo" class="cta cta--primary">
          Pieprasīt demo
          <svg class="cta__arrow" viewBox="0 0 20 20" width="16" height="16" aria-hidden="true">
            <path d="M4 10h11M11 5l5 5-5 5" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </a>
        <a href="#reports" class="cta cta--ghost">Skatīt dzīvās atskaites</a>
      </div>
    </div>
  </main>
</body>
</html>
