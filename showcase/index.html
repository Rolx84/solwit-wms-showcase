<!DOCTYPE html>
<html lang="lv">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Solwit WMS — noliktava kā vienots organisms</title>
<link rel="stylesheet" href="styles.css"/>
<style>
  @keyframes scan { 0%{top:0} 50%{top:calc(100% - 3px)} 100%{top:0} }
  @keyframes fade-in { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:none} }
  @keyframes pop { 0%{transform:scale(0);opacity:0} 60%{transform:scale(1.3);opacity:1} 100%{transform:scale(1);opacity:1} }
  @keyframes bar-grow { from{height:0} }
  @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-12px)} }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="OrbitScene.jsx"></script>
<script type="text/babel" src="Shared.jsx"></script>
<script type="text/babel" src="VariationC.jsx"></script>
<script type="text/babel" src="Sections.jsx"></script>

<script type="text/babel">
  function App() {
    // Reveal-on-scroll
    React.useEffect(() => {
      const io = new IntersectionObserver(es => {
        es.forEach(e => { if (e.isIntersecting) e.target.classList.add("on"); });
      }, { threshold: 0.15 });
      document.querySelectorAll(".reveal").forEach(el => io.observe(el));
      return () => io.disconnect();
    }, []);

    return (
      <>
        <Header />
        <HeroC />
        <Features />
        <Demo />
        <Ecosystem />
        <Proof />
        <CTA />
        <Footer />
      </>
    );
  }

  ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
